<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', 'PingFang SC', sans-serif;
    overflow: hidden;
  }
  .game-wrapper {
    background: linear-gradient(145deg, #12122a, #1a1a3e);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 0 60px rgba(0, 150, 255, 0.15), inset 0 0 60px rgba(0, 100, 255, 0.05);
    border: 1px solid rgba(0, 150, 255, 0.2);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 5px;
  }
  .title {
    color: #00d4ff;
    font-size: 24px;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    letter-spacing: 2px;
  }
  .score-board {
    display: flex;
    gap: 25px;
    background: rgba(0, 20, 60, 0.6);
    padding: 8px 20px;
    border-radius: 12px;
    border: 1px solid rgba(0, 150, 255, 0.2);
  }
  .score-item {
    text-align: center;
  }
  .score-label {
    color: #6a8cff;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-value {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
  }
  .score-value.high {
    color: #ffd700;
    text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
  }
  canvas {
    display: block;
    border-radius: 12px;
    background: #0d0d24;
    box-shadow: inset 0 0 40px rgba(0, 50, 150, 0.15);
    border: 1px solid rgba(0, 100, 255, 0.15);
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .btn {
    background: linear-gradient(135deg, #1a3a6a, #0f2a4f);
    color: #88bbff;
    border: 1px solid rgba(0, 150, 255, 0.3);
    padding: 10px 28px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .btn:hover {
    background: linear-gradient(135deg, #2a4a8a, #1a3a6a);
    box-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
    color: #aaddff;
    transform: translateY(-1px);
  }
  .btn:active { transform: translateY(0); }
  .hint {
    color: #4a6a9a;
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .hint span {
    color: #6a8cff;
    background: rgba(0, 50, 100, 0.3);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(0, 100, 255, 0.15);
  }
  /* Game Over Overlay */
  .overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.75);
    border-radius: 12px;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: flex; }
  .overlay h2 {
    color: #ff4466;
    font-size: 36px;
    text-shadow: 0 0 30px rgba(255, 68, 102, 0.5);
    margin-bottom: 10px;
  }
  .overlay p {
    color: #88aacc;
    font-size: 16px;
    margin-bottom: 5px;
  }
  .overlay .final-score {
    color: #fff;
    font-size: 48px;
    font-weight: 700;
    text-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
    margin: 10px 0;
  }
  .overlay .btn {
    margin-top: 15px;
    background: linear-gradient(135deg, #2a4a8a, #ff446644);
    border-color: #ff446688;
    color: #ff88aa;
  }
  .overlay .btn:hover {
    box-shadow: 0 0 30px rgba(255, 68, 102, 0.3);
  }
  .canvas-wrapper {
    position: relative;
    display: inline-block;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="title">🐍 SNAKE</div>
    <div class="score-board">
      <div class="score-item">
        <div class="score-label">分数</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-item">
        <div class="score-label">最高</div>
        <div class="score-value high" id="highScore">0</div>
      </div>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div class="overlay" id="overlay">
      <h2>💀 GAME OVER</h2>
      <p>得分</p>
      <div class="final-score" id="finalScore">0</div>
      <button class="btn" id="restartBtn">🔄 重新开始</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="pauseBtn">⏸ 暂停</button>
    <button class="btn" id="resetBtn">🔄 重置</button>
  </div>
  <div class="hint">
    <span>↑ ↓ ← →</span> 或 <span>W A S D</span> 控制方向 · <span>Space</span> 暂停/继续
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const finalScoreEl = document.getElementById('finalScore');
const overlay = document.getElementById('overlay');
const restartBtn = document.getElementById('restartBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');

const GRID_SIZE = 20;
const TILE_COUNT = canvas.width / GRID_SIZE;

let snake, direction, nextDirection, food, score, highScore, gameOver, paused, gameLoop;

function init() {
  snake = [{x: 7, y: 10}, {x: 6, y: 10}, {x: 5, y: 10}];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  score = 0;
  gameOver = false;
  paused = false;
  overlay.classList.remove('show');
  pauseBtn.textContent = '⏸ 暂停';
  highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
  highScoreEl.textContent = highScore;
  spawnFood();
  updateScore();
}

function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * TILE_COUNT),
      y: Math.floor(Math.random() * TILE_COUNT)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function updateScore() {
  scoreEl.textContent = score;
}

function gameOverHandler() {
  gameOver = true;
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
    highScoreEl.textContent = highScore;
  }
  finalScoreEl.textContent = score;
  overlay.classList.add('show');
}

function update() {
  if (gameOver || paused) return;

  direction = {...nextDirection};

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // Wall collision
  if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
    gameOverHandler();
    return;
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOverHandler();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    spawnFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(0, 50, 100, 0.12)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= TILE_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(i * GRID_SIZE, 0);
    ctx.lineTo(i * GRID_SIZE, canvas.height);
    ctx.stroke();
    ctx.moveTo(0, i * GRID_SIZE);
    ctx.lineTo(canvas.width, i * GRID_SIZE);
    ctx.stroke();
  }

  // Food
  const fx = food.x * GRID_SIZE;
  const fy = food.y * GRID_SIZE;
  const glow = ctx.createRadialGradient(fx + 10, fy + 10, 2, fx + 10, fy + 10, 14);
  glow.addColorStop(0, 'rgba(255, 50, 80, 0.6)');
  glow.addColorStop(1, 'rgba(255, 50, 80, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(fx - 4, fy - 4, GRID_SIZE + 8, GRID_SIZE + 8);

  ctx.shadowColor = '#ff3355';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff3355';
  ctx.beginPath();
  ctx.arc(fx + 10, fy + 10, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const x = seg.x * GRID_SIZE;
    const y = seg.y * GRID_SIZE;
    const ratio = 1 - (i / snake.length) * 0.5;
    const r = Math.round(0 * ratio);
    const g = Math.round(180 * ratio);
    const b = Math.round(255 * ratio);

    if (i === 0) {
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 16;
    } else {
      ctx.shadowBlur = 0;
    }

    ctx.fillStyle = i === 0 ? '#00d4ff' : `rgb(${r}, ${g}, ${b})`;
    const pad = i === 0 ? 1 : 2;
    const radius = i === 0 ? 5 : 4;
    roundRect(ctx, x + pad, y + pad, GRID_SIZE - pad * 2, GRID_SIZE - pad * 2, radius);
    ctx.fill();

    // Eyes on head
    if (i === 0) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      let ex1, ey1, ex2, ey2;
      if (direction.x === 1) { ex1 = 14; ey1 = 5; ex2 = 14; ey2 = 13; }
      else if (direction.x === -1) { ex1 = 4; ey1 = 5; ex2 = 4; ey2 = 13; }
      else if (direction.y === -1) { ex1 = 5; ey1 = 4; ex2 = 13; ey2 = 4; }
      else { ex1 = 5; ey1 = 14; ex2 = 13; ey2 = 14; }
      ctx.beginPath();
      ctx.arc(x + ex1, y + ey1, 2.5, 0, Math.PI * 2);
      ctx.arc(x + ex2, y + ey2, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(x + ex1, y + ey1, 1.3, 0, Math.PI * 2);
      ctx.arc(x + ex2, y + ey2, 1.3, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.shadowBlur = 0;

  // Pause overlay
  if (paused && !gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00d4ff';
    ctx.font = 'bold 32px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 20;
    ctx.fillText('⏸ 已暂停', canvas.width / 2, canvas.height / 2);
    ctx.shadowBlur = 0;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function togglePause() {
  if (gameOver) return;
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ 继续' : '⏸ 暂停';
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Escape') {
    e.preventDefault();
    togglePause();
    return;
  }

  if (gameOver) return;

  const keyMap = {
    'ArrowUp': {x: 0, y: -1},
    'ArrowDown': {x: 0, y: 1},
    'ArrowLeft': {x: -1, y: 0},
    'ArrowRight': {x: 1, y: 0},
    'w': {x: 0, y: -1},
    'W': {x: 0, y: -1},
    's': {x: 0, y: 1},
    'S': {x: 0, y: 1},
    'a': {x: -1, y: 0},
    'A': {x: -1, y: 0},
    'd': {x: 1, y: 0},
    'D': {x: 1, y: 0}
  };

  const newDir = keyMap[e.key];
  if (newDir && (direction.x + newDir.x !== 0 || direction.y + newDir.y !== 0)) {
    nextDirection = newDir;
  }
});

// Pause on window blur
window.addEventListener('blur', () => {
  if (!gameOver && !paused) togglePause();
});

// Buttons
restartBtn.addEventListener('click', () => { init(); });
resetBtn.addEventListener('click', () => {
  if (gameOver) { init(); return; }
  const sure = confirm('确定要重置游戏吗？');
  if (sure) init();
});
pauseBtn.addEventListener('click', togglePause);

// Touch support
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, {passive: true});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchStartX || !touchStartY || gameOver) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
    if (Math.abs(dx) > Math.abs(dy)) {
      const newDir = {x: dx > 0 ? 1 : -1, y: 0};
      if (direction.x + newDir.x !== 0) nextDirection = newDir;
    } else {
      const newDir = {x: 0, y: dy > 0 ? 1 : -1};
      if (direction.y + newDir.y !== 0) nextDirection = newDir;
    }
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
}, {passive: false});

// Game loop
function tick() {
  update();
  draw();
}

function startLoop() {
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, 120);
}

init();
startLoop();
</script>
</body>
</html>
