version: "3.9"

services:
  app-python:
    build:
      context: .
      dockerfile: Dockerfile
      target: python
    container_name: deepseek-python
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - deepseek-net

  app-node:
    build:
      context: .
      dockerfile: Dockerfile
      target: node
    container_name: deepseek-node
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - deepseek-net

networks:
  deepseek-net:
    driver: bridge
